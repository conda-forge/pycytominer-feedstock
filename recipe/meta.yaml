{% set name = "pycytominer" %}
{% set version = "1.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pycytominer-{{ version }}.tar.gz
  sha256: 7ae607ea668629940863e91db7649b0f0e641a586b599e21c3882632d7fbca6c

build:
  number: 1
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python
    - pip
    - poetry-core >=1.7
    - poetry-dynamic-versioning >=1.1
  run:
    - python
    - numpy >=1.16.5
    - scipy >=1.5
    - pandas >=1.2.0
    - scikit-learn >=0.21.2
    - sqlalchemy >=1.3.6,<3
    - pyarrow >=8.0.0

test:
  requires:
    - pip
    - python
  imports:
    - pycytominer
  commands:
    - pip check

outputs:
  - name: pycytominer
    version: {{ version }}
    requirements:
      run:
        - python
        - numpy >=1.16.5
        - scipy >=1.5
        - pandas >=1.2.0
        - scikit-learn >=0.21.2
        - sqlalchemy >=1.3.6,<3
        - pyarrow >=8.0.0
    test:
      requires:
        - pip
        - python
      imports:
        - pycytominer
      commands:
        - pip check

  - name: pycytominer.collate
    version: {{ version }}
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('pycytominer', exact=True) }}
        - cytominer_database >=0.3.4
        - csvkit >=1.0.2,<2
    test:
      requires:
        - pip
        - python
      imports:
        - pycytominer
        - cytominer_database
      commands:
        - pip check

  - name: pycytominer.cell-locations
    version: {{ version }}
    requirements:
      host:
        - python
      run:
        - python
        - {{ pin_subpackage('pycytominer', exact=True) }}
        - fsspec >=2023.1.0
        - s3fs >=2023.4.0
        - boto3 >=1.26.79
        - fire >=0.5.0
    test:
      requires:
        - python
      imports:
        - pycytominer.cyto_utils.cell_locations

  # Optional: anndata extra
  - name: pycytominer.anndata
    version: {{ version }}
    requirements:
      host:
        - python >=3.11
      run:
        - python >=3.11
        - {{ pin_subpackage('pycytominer', exact=True) }}
        - anndata >=0.12.2
        - zarr >=3.1.1
    test:
      requires:
        - python >=3.11
      imports:
        - anndata
        - zarr

about:
  home: https://github.com/cytomining/pycytominer
  summary: Python package for processing image-based profiling data
  license: BSD-3-Clause
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - gwaybio
    - kenibrewer
    - d33bs
