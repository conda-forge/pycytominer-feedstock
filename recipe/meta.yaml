{% set name = "pycytominer" %}
{% set version = "1.5.1" %}
{% set python_min = "3.10" %}
{% set python_max = "3.15" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pycytominer-{{ version }}.tar.gz
  sha256: c7a8649cc38fb0cfd081f9d45bf9a66f0833f558931b433a200f2c95455115e4

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >={{ python_min }},<{{ python_max }}
    - pip
    - setuptools >=80
    - setuptools-scm >=8
  run:
    - python >={{ python_min }},<{{ python_max }}
    - numpy >=1.16.5
    - scipy >=1.5        # [py==310]
    - scipy >=1.16.1     # [py>=311]
    - pandas >=1.2.0
    - scikit-learn >=0.21.2
    - sqlalchemy >=1.3.6,<3
    - pyarrow >=8.0.0
    - fire >=0.5
    - pyyaml >=6

test:
  requires:
    - pip
    - python >={{ python_min }},<{{ python_max }}
  imports:
    - pycytominer
  commands:
    - pip check

outputs:
  - name: pycytominer
    version: {{ version }}
    requirements:
      run:
        - python >={{ python_min }},<{{ python_max }}
        - numpy >=1.16.5
        - scipy >=1.5        # [py==310]
        - scipy >=1.16.1     # [py>=311]
        - pandas >=1.2.0
        - scikit-learn >=0.21.2
        - sqlalchemy >=1.3.6,<3
        - pyarrow >=8.0.0
        - fire >=0.5
        - pyyaml >=6
    test:
      requires:
        - pip
        - python >={{ python_min }},<{{ python_max }}
      imports:
        - pycytominer
      commands:
        - pip check

  - name: pycytominer.cell-locations
    version: {{ version }}
    requirements:
      host:
        - python >={{ python_min }},<{{ python_max }}
      run:
        - python >={{ python_min }},<{{ python_max }}
        - {{ pin_subpackage('pycytominer', exact=True) }}
        - fsspec >=2023.1.0
        - s3fs >=2023.4.0
        - boto3 >=1.26.79
    test:
      requires:
        - python >={{ python_min }},<{{ python_max }}
      imports:
        - pycytominer.cyto_utils.cell_locations

  # Optional: anndata extra
  - name: pycytominer.anndata
    version: {{ version }}
    requirements:
      host:
        - python >={{ python_min }},<{{ python_max }}
      run:
        - python >={{ python_min }},<{{ python_max }}
        - {{ pin_subpackage('pycytominer', exact=True) }}
        - anndata <0.12.2            # [py<311]
        - anndata >=0.12.2           # [py>=311]
        - zarr <3.1.1                # [py<311]
        - zarr >=3.1.1               # [py>=311]
    test:
      requires:
        - python >={{ python_min }},<{{ python_max }}
      imports:
        - anndata
        - zarr

about:
  home: https://pycytominer.readthedocs.io/
  summary: Python package for processing image-based profiling data
  license: BSD-3-Clause
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - gwaybio
    - kenibrewer
    - d33bs
